services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-antiterror}
      POSTGRES_USER: ${POSTGRES_USER:-antiterror}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-antiterror}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-antiterror}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
